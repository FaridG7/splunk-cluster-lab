---
# --- Paths (must match splunk_common defaults) --------------------------------
splunk_home: /opt/splunk
splunk_user: splunk
splunk_group: splunk
# --- Service ------------------------------------------------------------------
splunk_service_name: Splunkd
# --- Admin credentials --------------------------------------------------------
# splunk_admin_username and splunk_admin_password come from vault.yml
splunk_admin_username: admin
# --- TLS ----------------------------------------------------------------------
# Single source of truth for TLS across the entire cluster.
# false  → plain HTTP on port 8089 (lab default)
# true   → HTTPS on port 8089 (production)
splunk_enable_tls: false
# --- API scheme ---------------------------------------------------------------
# Derived from splunk_enable_tls. Used in every URI task across all roles
# so that switching TLS on/off requires changing only splunk_enable_tls above.
#
# This is the fix for the https:// hardcoding bug — every wait.yml uses
# {{ splunk_api_scheme }}://host:8089/... instead of https://host:8089/...
splunk_api_scheme: "{{ 'https' if splunk_enable_tls else 'http' }}"
# --- Cluster shared secret ----------------------------------------------------
# Referenced in splunk_cluster_manager, splunk_indexer, splunk_search_head.
# The actual value lives in vault.yml.
splunk_cluster_pass4symmkey: "{{ vault_cluster_pass4symmkey }}"
# --- Management port ----------------------------------------------------------
splunk_mgmt_port: 8089
# --- Splunk install source ----------------------------------------------------
splunk_archive_local_path: "~/Downloads/splunk-10.4.0-f798d4d49089-linux-amd64.tgz"
# Re-staged on each node to /tmp/splunk.tgz (matches the role default).
# splunk_archive_remote_path: /tmp/splunk.tgz
