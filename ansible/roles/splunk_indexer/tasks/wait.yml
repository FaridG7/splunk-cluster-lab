---
- name: Wait for peer management port to open after restart
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 8089
    timeout: 120
    state: started

- name: Poll CM peer list until this peer appears as Up
  ansible.builtin.uri:
    url: "{{ splunk_api_scheme }}://{{ hostvars[groups['cluster_manager'][0]]['ansible_host'] }}:\
          8089/services/cluster/manager/peers?output_mode=json"
    method: GET
    user: "{{ splunk_admin_username }}"
    password: "{{ splunk_admin_password }}"
    validate_certs: false
    status_code: 200
    return_content: true
  register: cm_peers
  until: >
    cm_peers.status == 200 and
    cm_peers.json.entry |
      selectattr('content.label', 'equalto', inventory_hostname) |
      selectattr('content.status', 'equalto', 'Up') |
      list | length > 0
  retries: "{{ splunk_peer_readiness_retries }}"
  delay: "{{ splunk_peer_readiness_delay }}"
  failed_when: cm_peers.status not in [200]
