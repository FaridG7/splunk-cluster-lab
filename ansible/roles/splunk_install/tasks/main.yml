---
- name: Assert required variables are defined
  ansible.builtin.import_tasks: assert.yml
  tags: [always, assert]

- name: Stage the Splunk tarball on the target host
  ansible.builtin.import_tasks: fetch.yml
  tags: [install, fetch]

- name: Extract the tarball into SPLUNK_HOME
  ansible.builtin.import_tasks: extract.yml
  tags: [install, extract]

- name: Write base server.conf before first start
  ansible.builtin.import_tasks: configure.yml
  tags: [install, configure]

- name: Bootstrap Splunk first run and admin password
  ansible.builtin.import_tasks: bootstrap.yml
  tags: [install, bootstrap]
