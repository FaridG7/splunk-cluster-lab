---
- name: Enable Splunk boot-start (systemd)
  ansible.builtin.command:
    cmd: "{{ splunk_home }}/bin/splunk enable boot-start -systemd-managed 1 -user splunk -group splunk --answer-yes --accept-license" 
    creates: "/etc/systemd/system/{{ splunk_service_name }}.service"
  become: true
  register: bootstart_result
  when: splunk_enable_boot_start | bool
  notify: Reload systemd

- name: Flush Handlers
  ansible.builtin.meta: flush_handlers

- name: Ensure Splunk service is enabled and started
  ansible.builtin.systemd:
    name: "{{ splunk_service_name }}"
    enabled: true
    state: started
  when: splunk_enable_boot_start | bool
