---
- name: Check if Splunk binary already present (install marker)
  ansible.builtin.stat:
    path: "{{ splunk_home }}/bin/splunk"
  register: splunk_binary

- name: Extract Splunk tarball as the splunk user
  ansible.builtin.unarchive:
    src: "{{ splunk_archive_remote_path }}"
    dest: "{{ splunk_extract_target }}"
    remote_src: true
    owner: "{{ splunk_user }}"
    group: "{{ splunk_group }}"
    extra_opts: "--no-same-owner"
  become: true
  become_user: root
  when: not splunk_binary.stat.exists

- name: Ensure SPLUNK_HOME tree is owned by splunk
  ansible.builtin.file:
    path: "{{ splunk_home }}"
    owner: "{{ splunk_user }}"
    group: "{{ splunk_group }}"
    recurse: true
  when: not splunk_binary.stat.exists
