---
# --- Splunk user & group -------------------------------------------------------
splunk_user: splunk
splunk_group: splunk
splunk_user_uid: 1500          # explicit UID avoids drift across nodes
splunk_user_gid: 1500

# --- Directory layout ---------------------------------------------------------
splunk_home: /opt/splunk
splunk_var_dir: /opt/splunk/var
splunk_db_dir: /opt/splunk/var/lib/splunk

# --- ulimit targets (Splunk recommendations) ----------------------------------
splunk_ulimit_open_files: 65535
splunk_ulimit_max_procs: 16000

# --- Kernel / OS tuning -------------------------------------------------------
splunk_vm_max_map_count: 262144        # required for Splunk's memory-mapped files
splunk_vm_swappiness: 10               # reduce swap aggressiveness
splunk_net_core_somaxconn: 1024        # listen backlog for high-ingest nodes
splunk_disable_thp: true               # Transparent Huge Pages harm Splunk perf

# --- NTP / time ---------------------------------------------------------------
# Splunk clustering is sensitive to clock skew. Ensure NTP is running.
#
# Ubuntu 24.04 cloud images use systemd-timesyncd (built into systemd, always
# present, no package needed). RHEL/Rocky use chronyd. ntpd is legacy.
#   Ubuntu 22.04 / 24.04  → systemd-timesyncd
#   RHEL / Rocky 8 & 9    → chronyd
splunk_ntp_service: systemd-timesyncd
