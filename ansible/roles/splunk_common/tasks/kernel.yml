---
# =============================================================================
# Kernel parameter tuning via sysctl.
# Using ansible.posix.sysctl writes to /etc/sysctl.d/ so settings
# survive reboots. Each parameter is idempotent.
# =============================================================================

- name: Set vm.max_map_count for Splunk memory-mapped files
  ansible.posix.sysctl:
    name: vm.max_map_count
    value: "{{ splunk_vm_max_map_count }}"
    state: present
    sysctl_file: /etc/sysctl.d/99-splunk.conf
    reload: true

- name: Set vm.swappiness to reduce swap pressure
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "{{ splunk_vm_swappiness }}"
    state: present
    sysctl_file: /etc/sysctl.d/99-splunk.conf
    reload: true

- name: Set net.core.somaxconn for high-ingest connections
  ansible.posix.sysctl:
    name: net.core.somaxconn
    value: "{{ splunk_net_core_somaxconn }}"
    state: present
    sysctl_file: /etc/sysctl.d/99-splunk.conf
    reload: true
