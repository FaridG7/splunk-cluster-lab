---
# =============================================================================
# Create the Splunk directory tree before the binary is installed.
# Doing this here (not in splunk_install) means the splunk user owns
# the directories from the start — no permission fixup needed later.
#
# Permissions follow the principle of least privilege:
#   splunk_home  : 0755 — Splunk process and admins need traversal
#   var/db dirs  : 0700 — only the splunk user should read index data
# =============================================================================

- name: Create SPLUNK_HOME
  ansible.builtin.file:
    path: "{{ splunk_home }}"
    state: directory
    owner: "{{ splunk_user }}"
    group: "{{ splunk_group }}"
    mode: '0755'

- name: Create Splunk var directory
  ansible.builtin.file:
    path: "{{ splunk_var_dir }}"
    state: directory
    owner: "{{ splunk_user }}"
    group: "{{ splunk_group }}"
    mode: '0755'

- name: Create Splunk DB (index data) directory
  ansible.builtin.file:
    path: "{{ splunk_db_dir }}"
    state: directory
    owner: "{{ splunk_user }}"
    group: "{{ splunk_group }}"
    mode: '0700'              # index data is private to the splunk user
