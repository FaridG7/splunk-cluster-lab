---
- name: Create SPLUNK_HOME
  ansible.builtin.file:
    path: "{{ splunk_home }}"
    state: directory
    owner: "{{ splunk_user }}"
    group: "{{ splunk_group }}"
    mode: '0755'

- name: Create Splunk var directory
  ansible.builtin.file:
    path: "{{ splunk_var_dir }}"
    state: directory
    owner: "{{ splunk_user }}"
    group: "{{ splunk_group }}"
    mode: '0755'

- name: Create Splunk DB (index data) directory
  ansible.builtin.file:
    path: "{{ splunk_db_dir }}"
    state: directory
    owner: "{{ splunk_user }}"
    group: "{{ splunk_group }}"
    mode: '0700'              # index data is private to the splunk user
