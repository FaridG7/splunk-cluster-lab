---
# =============================================================================
# Wait for the Cluster Manager to become ready.
#
# After a restart the CM needs time to:
#   - initialise its internal SQLite state DB
#   - open the management port (8089)
#   - start serving the /services/cluster/manager/info endpoint
# =============================================================================
- name: Wait for CM management port to open
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 8089
    timeout: 120
    state: started

- name: Poll CM /info endpoint until status is ready
  ansible.builtin.uri:
    url: "{{ splunk_api_scheme }}://{{ ansible_host }}:8089/services/cluster/manager/info\
          ?output_mode=json"
    method: GET
    user: "{{ splunk_admin_username }}"
    password: "{{ splunk_admin_password }}"
    validate_certs: "{{ splunk_enable_tls }}"
    status_code: [200, 401, 403, 503]
    return_content: true
  register: cm_info
  until: >
    cm_info.status == 200 and
    (cm_info.json.entry[0].content.active_bundle is defined)
  retries: "{{ splunk_cm_readiness_retries }}"
  delay: "{{ splunk_cm_readiness_delay }}"
  failed_when: false
