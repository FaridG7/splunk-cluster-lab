---
# =============================================================================
# Create the deployment-apps directory tree and the base outputs app.
#
# The outputs app (org_all_indexers_output) is the most critical thing the
# DS pushes to forwarders. It configures outputs.conf so every forwarder
# knows which indexer IPs and port to send data to.
#
# The indexer list is built dynamically from the [indexers] inventory group
# using hostvars to resolve each host's ansible_host IP. This means adding
# a new indexer to the inventory automatically includes it in the outputs
# app on the next DS play run — no manual IP management.
#
# App structure follows Splunk convention:
#   deployment-apps/
#     org_all_indexers_output/      ← pushed to all UFs
#       default/
#         outputs.conf              ← indexer targets
#       metadata/
#         default.meta              ← required for app to be valid
# =============================================================================

- name: Create deployment-apps root directory
  ansible.builtin.file:
    path: "{{ splunk_ds_apps_dir }}"
    state: directory
    owner: "{{ splunk_user }}"
    group: "{{ splunk_group }}"
    mode: '0755'

- name: Create outputs app default directory
  ansible.builtin.file:
    path: "{{ splunk_ds_apps_dir }}/{{ splunk_outputs_app_name }}/default"
    state: directory
    owner: "{{ splunk_user }}"
    group: "{{ splunk_group }}"
    mode: '0755'

- name: Create outputs app metadata directory
  ansible.builtin.file:
    path: "{{ splunk_ds_apps_dir }}/{{ splunk_outputs_app_name }}/metadata"
    state: directory
    owner: "{{ splunk_user }}"
    group: "{{ splunk_group }}"
    mode: '0755'

- name: Deploy outputs.conf to the outputs app
  ansible.builtin.template:
    src: outputs.conf.j2
    dest: "{{ splunk_ds_apps_dir }}/{{ splunk_outputs_app_name }}/default/outputs.conf"
    owner: "{{ splunk_user }}"
    group: "{{ splunk_group }}"
    mode: '0644'
  notify: Reload deployment server

- name: Deploy default.meta to the outputs app
  ansible.builtin.copy:
    src: default.meta
    dest: "{{ splunk_ds_apps_dir }}/{{ splunk_outputs_app_name }}/metadata/default.meta"
    owner: "{{ splunk_user }}"
    group: "{{ splunk_group }}"
    mode: '0644'
  notify: Reload deployment server
