---
# =============================================================================
# Deploy the Deployment Server server.conf stanza.
#
# Stanza ownership (role_deployment_server app dir):
#   server.conf → [deployment-server] stanza only
#
# mgmt-0 already has role_cluster_manager/local/server.conf from play 02.
# This role writes to role_deployment_server/local/server.conf — a
# completely separate file. Splunk merges both at runtime. No conflict.
# =============================================================================

- name: Create role app directory for deployment_server
  ansible.builtin.file:
    path: "{{ splunk_home }}/etc/apps/role_deployment_server/local"
    state: directory
    owner: "{{ splunk_user }}"
    group: "{{ splunk_group }}"
    mode: '0755'

- name: Deploy deployment server server.conf stanza
  ansible.builtin.template:
    src: server.conf.j2
    dest: "{{ splunk_home }}/etc/apps/role_deployment_server/local/server.conf"
    owner: "{{ splunk_user }}"
    group: "{{ splunk_group }}"
    mode: '0600'
  notify: Restart splunk
