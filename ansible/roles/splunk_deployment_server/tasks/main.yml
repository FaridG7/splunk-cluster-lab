---
# =============================================================================
# splunk_deployment_server — tasks/main.yml
#
# Execution order:
#   1. assert      — fail fast on missing variables
#   2. configure   — write DS server.conf stanza into its own app dir
#                    (does NOT touch role_cluster_manager on same host)
#   3. flush       — restart if server.conf changed
#   4. apps        — create deployment-apps directory tree and drop the
#                    base outputs app for forwarders
#   5. serverclass — write serverclass.conf assigning the outputs app
#                    to the universal_forwarders class
#   6. wait        — confirm DS is accepting forwarder connections
#
# Steps 4 and 5 notify `reload deployment server` (not a full restart)
# since app and serverclass changes don't require a process restart —
# only a DS subsystem reload. This avoids disrupting the CM role that
# is also running on this same Splunk process.
# =============================================================================

- name: Assert required DS variables are defined
  ansible.builtin.import_tasks: assert.yml
  tags: [always, assert]

- name: Deploy Deployment Server server.conf stanza
  ansible.builtin.import_tasks: configure.yml
  tags: [deployment_server, configure]

- name: Flush handlers to restart Splunk if server.conf changed
  ansible.builtin.meta: flush_handlers
  tags: [deployment_server, configure]

- name: Create deployment-apps directory and base outputs app
  ansible.builtin.import_tasks: apps.yml
  tags: [deployment_server, apps]

- name: Write serverclass.conf
  ansible.builtin.import_tasks: serverclass.yml
  tags: [deployment_server, serverclass]

- name: Flush handlers to reload deploy-server if apps changed
  ansible.builtin.meta: flush_handlers
  tags: [deployment_server, apps, serverclass]

- name: Wait for Deployment Server to be ready
  ansible.builtin.import_tasks: wait.yml
  tags: [deployment_server, wait]
