---
# =============================================================================
# Wait for the Deployment Server to be ready to accept forwarder connections.
#
# We poll /services/deployment/server/config on the DS itself. When this
# endpoint responds with disabled = false the DS subsystem is initialised
# and forwarders can phone home.
#
# We also verify the outputs app exists in the deployment-apps listing so
# we know forwarders will actually receive something when they connect.
# =============================================================================

- name: Wait for DS management port to open
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 8089
    timeout: 120
    state: started

- name: Poll DS config endpoint until deployment server is enabled
  ansible.builtin.uri:
    url: "https://{{ ansible_host }}:8089/services/deployment/server/\
          config?output_mode=json"
    method: GET
    user: "{{ splunk_admin_username }}"
    password: "{{ splunk_admin_password }}"
    validate_certs: false
    status_code: 200
    return_content: true
  register: ds_config
  until: >
    ds_config.status == 200 and
    ds_config.json.entry | length > 0 and
    not (ds_config.json.entry[0].content.disabled | default(true) | bool)
  retries: "{{ splunk_ds_readiness_retries }}"
  delay: "{{ splunk_ds_readiness_delay }}"
  failed_when: ds_config.status not in [200, -1]

- name: Verify outputs app is present in deployment-apps
  ansible.builtin.stat:
    path: "{{ splunk_ds_apps_dir }}/{{ splunk_outputs_app_name }}/default/outputs.conf"
  register: outputs_app_stat

- name: Assert outputs app was deployed correctly
  ansible.builtin.assert:
    that:
      - outputs_app_stat.stat.exists
    fail_msg: >
      outputs.conf not found at
      {{ splunk_ds_apps_dir }}/{{ splunk_outputs_app_name }}/default/outputs.conf.
      Check the apps.yml task for errors.

- name: Report DS status
  ansible.builtin.debug:
    msg: >
      Deployment Server on {{ inventory_hostname }} is ready.
      Server class : {{ splunk_uf_serverclass }}
      Outputs app  : {{ splunk_outputs_app_name }}
      Indexer targets: {{
        groups['indexers'] |
        map('extract', hostvars, 'ansible_host') |
        map('regex_replace', '$', ':' ~ splunk_receiving_port) |
        list | join(', ')
      }}
