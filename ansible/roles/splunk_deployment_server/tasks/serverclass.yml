---
# =============================================================================
# Write serverclass.conf.
#
# serverclass.conf is the DS's routing table — it maps which apps get pushed
# to which forwarders. The file lives in system/local/ because it is a
# DS-global config, not an app-scoped config. There is no conflict risk here:
# no other role writes to system/local/serverclass.conf because serverclass.conf
# is a DS-exclusive file (the CM, LM, and MC have no serverclass concept).
#
# The universal_forwarders class matches forwarders by their client name
# (which defaults to hostname). We use a wildcard match so any forwarder
# that phones home gets the outputs app automatically — no per-host config.
# =============================================================================

- name: Create system/local directory if not present
  ansible.builtin.file:
    path: "{{ splunk_home }}/etc/system/local"
    state: directory
    owner: "{{ splunk_user }}"
    group: "{{ splunk_group }}"
    mode: '0755'

- name: Deploy serverclass.conf
  ansible.builtin.template:
    src: serverclass.conf.j2
    dest: "{{ splunk_home }}/etc/system/local/serverclass.conf"
    owner: "{{ splunk_user }}"
    group: "{{ splunk_group }}"
    mode: '0600'
  notify: Reload deployment server
