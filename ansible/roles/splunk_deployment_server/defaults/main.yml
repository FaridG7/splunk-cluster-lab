---
# =============================================================================
# splunk_deployment_server — defaults
# Override in inventories/lab/group_vars/deployment_server.yml
# =============================================================================

# --- Deployment Server port ---------------------------------------------------
# Port forwarders use to phone home to the DS.
splunk_ds_port: 8089

# --- Deployment apps directory ------------------------------------------------
# Root of the DS app repository. Each subdirectory is an app that can be
# assigned to a server class and pushed to matching forwarders.
splunk_ds_apps_dir: "{{ splunk_home }}/etc/deployment-apps"

# --- Base outputs app ---------------------------------------------------------
# The DS pushes this app to all forwarders in the universal_forwarders class.
# It configures outputs.conf so forwarders send data to the indexer tier.
# The app name follows the Splunk convention: org_all_<purpose>.
splunk_outputs_app_name: org_all_indexers_output

# --- Indexer receiving port ---------------------------------------------------
# Must match splunk_receiving_port in splunk_indexer/defaults/main.yml.
# Forwarders send data to this port on every indexer peer.
splunk_receiving_port: 9997

# --- Server class name --------------------------------------------------------
# Logical grouping name for Universal Forwarders in serverclass.conf.
splunk_uf_serverclass: universal_forwarders

# --- DS readiness polling -----------------------------------------------------
splunk_ds_readiness_retries: 18
splunk_ds_readiness_delay: 10     # 18 * 10 = 180s max
