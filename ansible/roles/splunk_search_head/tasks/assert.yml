---
- name: Assert splunk_cluster_pass4symmkey is set
  ansible.builtin.assert:
    that:
      - splunk_cluster_pass4symmkey is defined
      - splunk_cluster_pass4symmkey | length >= 16
    fail_msg: >
      splunk_cluster_pass4symmkey must be set and at least 16 characters.
      It must be identical to the value used on the CM and all indexer peers.
      Store it in inventories/lab/group_vars/all/vault.yml.

- name: Assert cluster_manager group is not empty
  ansible.builtin.assert:
    that:
      - groups['cluster_manager'] | length > 0
    fail_msg: >
      The [cluster_manager] inventory group is empty.
      The search head derives the CM URI from this group at runtime.

- name: Assert at least one indexer peer is registered
  ansible.builtin.assert:
    that:
      - groups['indexers'] | length > 0
    fail_msg: >
      The [indexers] inventory group is empty. Play 03 must complete
      successfully before the search head can be configured.

- name: Assert web port is valid
  ansible.builtin.assert:
    that:
      - splunk_web_port | int > 1024
      - splunk_web_port | int < 65535
    fail_msg: "splunk_web_port must be between 1024 and 65535. Got: {{ splunk_web_port }}"
