---
# =============================================================================
# splunk_search_head — tasks/main.yml
#
# Execution order:
#   1. assert    — fail fast on missing secret or empty CM group
#   2. configure — write server.conf (clustering searchhead mode),
#                  distsearch.conf (cluster-aware peer discovery),
#                  and web.conf (port + TLS setting)
#   3. flush     — trigger restart NOW so wait.yml sees the restarted process
#   4. wait      — confirm the SH is serving the search API before returning
#
# No serial: needed here — there is one SH in C11 (sh-0). If you later
# add a Search Head Cluster that becomes a different role (splunk_shc_*).
# =============================================================================

- name: Assert required search head variables are defined
  ansible.builtin.import_tasks: assert.yml
  tags: [always, assert]

- name: Deploy search head configuration
  ansible.builtin.import_tasks: configure.yml
  tags: [search_head, configure]

- name: Flush handlers to restart Splunk if config changed
  ansible.builtin.meta: flush_handlers
  tags: [search_head, configure]

- name: Wait for Search Head to be ready
  ansible.builtin.import_tasks: wait.yml
  tags: [search_head, wait]
